name: Render CI/CD

on:
  # pull_request:
  #   branches:
  #     - main
  # push:
  #   branches:
  #     - main
  workflow_dispatch:

jobs:
  verify-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
          VITE_PREMIUM_KEEP_ALIVE_MS: ${{ secrets.VITE_PREMIUM_KEEP_ALIVE_MS }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

  verify-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server deps
        run: npm ci

      - name: Validate server entrypoint syntax
        run: node --check server.js

      - name: Server build script
        run: npm run build

  deploy-render:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - verify-frontend
      - verify-server
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render backend deploy (optional)
        env:
          RENDER_BACKEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_BACKEND_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_BACKEND_DEPLOY_HOOK_URL is not set; skipping backend deploy hook."
            exit 0
          fi
          curl -fsS -X POST "$RENDER_BACKEND_DEPLOY_HOOK_URL"
          echo "Backend deploy hook triggered."

      - name: Trigger Render frontend deploy (optional)
        env:
          RENDER_FRONTEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_FRONTEND_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_FRONTEND_DEPLOY_HOOK_URL is not set; skipping frontend deploy hook."
            exit 0
          fi
          curl -fsS -X POST "$RENDER_FRONTEND_DEPLOY_HOOK_URL"
          echo "Frontend deploy hook triggered."
