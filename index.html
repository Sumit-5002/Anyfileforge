<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="AnyFileForge - Free, open-source cross-platform file sharing and processing system for engineers and researchers" />
  <meta name="keywords" content="file sharing, PDF tools, file conversion, open source, privacy-focused" />
  <meta name="theme-color" content="#020617" />
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>AnyFileForge - Free File Processing & Sharing Platform</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://apis.google.com" crossorigin>
  <link rel="preconnect" href="https://anyfileforge.firebaseapp.com" crossorigin>
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;700&display=swap">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;700&display=swap"
    media="print" onload="this.media='all'">
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;700&display=swap">
  </noscript>
  <script>
    // Capture PWA install prompt as early as possible
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window['__anyfileforgeDeferredInstallPrompt'] = e;
    });
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
